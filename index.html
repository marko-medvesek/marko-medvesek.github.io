<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARS kamere v zivo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="app-header">
        <div class="header-copy">
            <p class="eyebrow">DARS kamere</p>
            <h1>Prometne kamere v zivo</h1>
            <p class="summary">DARS kamere po regijah, regijske kamere loceno, osvezitev po viru.</p>
        </div>
        <div class="header-actions">
            <div class="live-status" aria-live="polite">
                <span class="status-dot" aria-hidden="true"></span>
                <span id="lastUpdated">Osvezuje se...</span>
            </div>
            <button class="pause-button" type="button" id="pauseRefresh" aria-pressed="false">Premor</button>
        </div>
    </header>

    <main class="app-shell">
        <section class="toolbar" aria-label="Izbira avtoceste">
            <div class="road-tabs" id="roadTabs"></div>
            <label class="search-field">
                <span>Isci</span>
                <input id="searchInput" type="search" placeholder="Kamera ali smer">
            </label>
        </section>

        <section class="section-heading">
            <div>
                <h2 id="sectionTitle">Vse kamere</h2>
                <p id="sectionMeta"></p>
            </div>
        </section>

        <section class="camera-grid" id="cameraGrid" aria-live="polite"></section>
        <p class="empty-state" id="emptyState" hidden>Ni kamer za izbrani prikaz.</p>
    </main>

    <div class="modal" id="cameraModal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal-backdrop" data-close-modal></div>
        <div class="modal-panel">
            <div class="modal-topbar">
                <div>
                    <p id="modalRoad"></p>
                    <h2 id="modalTitle">Kamera</h2>
                    <span id="modalDirection"></span>
                </div>
                <button class="icon-button" type="button" data-close-modal aria-label="Zapri galerijo">x</button>
            </div>

            <div class="modal-stage">
                <button class="gallery-button previous" type="button" id="previousCamera" aria-label="Prejsnja kamera">&lsaquo;</button>
                <img id="modalImage" src="" alt="">
                <button class="gallery-button next" type="button" id="nextCamera" aria-label="Naslednja kamera">&rsaquo;</button>
            </div>

            <div class="modal-footer">
                <span id="modalCounter"></span>
                <span>Osvezitev vsako sekundo</span>
            </div>
        </div>
    </div>

    <script src="cameras.js"></script>
    <script src="app.js"></script>
</body>
</html>
